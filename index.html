<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital Dance Vic - Login</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="app.js"></script>
</head>
<body>
  <main class="container centered">

    <h1 class="title">Capital Dance Vic</h1>
    <p class="subtitle">Fes login o registra’t per gestionar les teves reserves</p>

    <section class="card">
      <h2>Register</h2>
      <input type="email" id="registerEmail" placeholder="Correu electrònic">
      <input type="password" id="registerPassword" placeholder="Contrasenya">
      <button id="registerBtn" class="btn">Registra’t</button>
    </section>

    <section class="card">
      <h2>Login</h2>
      <input type="email" id="loginEmail" placeholder="Correu electrònic">
      <input type="password" id="loginPassword" placeholder="Contrasenya">
      <button id="loginBtn" class="btn">Inicia sessió</button>
    </section>

  </main>
</body>
</html>
