<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital Dance Vic - Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="app.js"></script>
</head>
<body>

  <!-- HEADER ROSA -->
  <header class="main-header">
  <div class="header-content">
    
    <img src="logo.png" alt="Capital Dance Vic" class="logo">

    <div class="user-area">
      <div class="user-info">
        <div class="user-avatar">
          👤
        </div>
        <div class="user-name" id="userFullName">
          Nom Cognoms
        </div>
      </div>

      <button id="logoutBtn" class="logout-btn">
        Tancar sessió
      </button>
    </div>

  </div>
</header>

  <!-- SUBHEADER TABS -->
  <div class="sub-header">
    <button class="tab-btn active" data-tab="master">Master Class</button>
    <button class="tab-btn" data-tab="foto">Fotografia d'estudi</button>
    <button class="tab-btn" data-tab="reserves">Les meves reserves</button>
  </div>

  <!-- CONTINGUT DINÀMIC -->
  <main class="container">
    <div id="contentArea"></div>
  </main>

</body>
</html>
