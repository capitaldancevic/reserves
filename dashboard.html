<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital Dance Vic - Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="logo_cd_v.svg">
  <link rel="alternate icon" href="favicon.ico">
  <script type="module" src="app.js"></script>
</head>
<body>

  <!-- HEADER ROSA -->
  <header class="main-header">
  <div class="header-content">
    
    <img src="logo_cd_h.svg" alt="Capital Dance Vic" class="logo">

    <div class="user-area">
      <div class="user-info">
        <div class="user-avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false">
            <path d="M12 12c2.76 0 5-2.24 5-5S14.76 2 12 2 7 4.24 7 7s2.24 5 5 5Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"></path>
          </svg>
        </div>
        <div class="user-name" id="userFullName">
          Nom Cognoms
        </div>
      </div>

      <button id="logoutBtn" class="logout-btn">
        Tancar sessió
      </button>
    </div>

  </div>
</header>

  <!-- SUBHEADER TABS -->
  <div class="sub-header">
    <button class="tab-btn active" data-tab="master">Master Class</button>
    <button class="tab-btn" data-tab="foto">Fotografia d'estudi</button>
    <button class="tab-btn" data-tab="reserves">Les meves reserves</button>
  </div>

  <!-- CONTINGUT DINÀMIC -->
  <main class="container">
    <div id="contentArea"></div>
  </main>

</body>
</html>
