<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital Dance Vic - Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="logo_cd_v.svg">
  <link rel="alternate icon" href="favicon.ico">
  <script type="module" src="app.js"></script>
</head>
<body class="admin-page">

  <!-- HEADER -->
  <header class="main-header">
    <div class="header-content">

      <img src="logo_cd_h.svg" alt="Capital Dance Vic" class="logo">

      <div class="user-area">
        <div class="user-info">
          <div class="user-avatar" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img" focusable="false">
              <path d="M12 12c2.76 0 5-2.24 5-5S14.76 2 12 2 7 4.24 7 7s2.24 5 5 5Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"></path>
            </svg>
          </div>
          <div class="user-name">
            Admin
          </div>
        </div>

        <button id="goDashboardBtn" class="logout-btn">
          Vista usuari
        </button>

        <button id="logoutBtn" class="logout-btn">
          Tancar sessió
        </button>
      </div>

    </div>
  </header>

  <!-- SUBNAV -->
  <div class="sub-header admin-subheader">
    <button class="tab-btn active" data-admin-tab="create">Crear activitat</button>
    <button class="tab-btn" data-admin-tab="manage">Consultar activitats</button>
    <button class="tab-btn" data-admin-tab="waitlist">Llistes d'espera</button>
  </div>

  <main class="admin-container">

    <!-- ================= CREATE VIEW ================= -->
    <section id="adminCreateView" class="admin-view active">

      <div class="admin-card big">
        <h2>Nova Master Class</h2>

        <div class="form-grid">

          <input id="lloc" placeholder="Lloc">
          <input id="data" type="date">
          <input id="horari" placeholder="18:00 - 19:30">
          <input id="professor" placeholder="Professor">
          <input id="disciplina" placeholder="Disciplina">
          <input id="nivell" placeholder="Nivell">
          <input id="spots" type="number" placeholder="Places totals">

        </div>

        <div class="admin-form-actions">
          <button id="createActivity" class="btn primary">
            Crear Master Class
          </button>

          <button type="button" id="cancelEditBtn" class="btn cancel-edit-btn" style="display:none;">
            Cancel·lar edició
          </button>
        </div>
      </div>

    </section>

    <!-- ================= MANAGE VIEW ================= -->
    <section id="adminManageView" class="admin-view">

      <div class="admin-export-bar">
        <button id="exportExcelBtn" class="btn excel-btn" title="Exportar reserves">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16l4-2 4 2 4-2 4 2V8l-6-6Zm1 7V3.5L19.5 9H15Z"/>
          </svg>
          Exportar reserves
        </button>
      </div>

      <div id="adminActivitiesGrid" class="admin-activities-grid"></div>

    </section>

    <section id="adminWaitlistView" class="admin-view">
      <div id="adminWaitlistGrid" class="admin-activities-grid"></div>
    </section>

  </main>

</body>
</html>
